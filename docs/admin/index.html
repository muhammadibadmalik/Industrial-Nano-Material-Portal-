<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — NanoCal Industries</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}

    /* ── Top bar ── */
    .topbar{background:#1a3c2e;color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{font-size:18px;font-weight:600;letter-spacing:.3px}
    .topbar span{font-size:13px;opacity:.75}
    .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s}
    .logout-btn:hover{background:rgba(255,255,255,.25)}

    /* ── Layout ── */
    .container{max-width:1100px;margin:32px auto;padding:0 20px}

    /* ── Stats ── */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .stat-card .num{font-size:32px;font-weight:700;color:#1a3c2e}
    .stat-card .lbl{font-size:13px;color:#888;margin-top:4px}

    /* ── Section header ── */
    .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .sec-header h2{font-size:17px;font-weight:600}
    .btn-add{background:#1a3c2e;color:#fff;border:none;padding:9px 20px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:500;transition:background .2s}
    .btn-add:hover{background:#24523e}

    /* ── Table ── */
    .table-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-bottom:36px}
    table{width:100%;border-collapse:collapse}
    thead{background:#1a3c2e;color:#fff}
    th{padding:12px 16px;text-align:left;font-size:13px;font-weight:500}
    td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafafa}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
    .badge-desiccant {background:#e8f4e8;color:#1a6b1a}
    .badge-industrial{background:#e8eef8;color:#1a3c7a}
    .badge-deicing   {background:#e8f0fb;color:#1a4f9a}
    .badge-laboratory{background:#f5eef8;color:#6a1a7a}
    .stock-yes{color:#1a7a1a;font-weight:600}
    .stock-no {color:#c0392b;font-weight:600}
    .actions{display:flex;gap:8px}
    .btn-edit{background:#e8f0fe;color:#1a3c7a;border:none;padding:5px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;transition:background .2s}
    .btn-edit:hover{background:#ccdcfc}
    .btn-del {background:#fde8e8;color:#c0392b;border:none;padding:5px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;transition:background .2s}
    .btn-del:hover{background:#fbcaca}

    /* ── Inquiries table ── */
    .status-new    {background:#fdeee8;color:#c04a10;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
    .status-read   {background:#e8f4e8;color:#1a6b1a;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
    .status-replied{background:#e8eef8;color:#1a3c7a;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}

    /* ── Modal ── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:12px;width:680px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal-header{padding:20px 24px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
    .modal-header h3{font-size:16px;font-weight:600}
    .close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}
    .modal-body{padding:24px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group.full{grid-column:1/-1}
    .form-group label{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px}
    .form-group input,
    .form-group select,
    .form-group textarea{border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:13px;font-family:inherit;transition:border .2s}
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus{outline:none;border-color:#1a3c2e}
    .form-group textarea{resize:vertical;min-height:70px}
    .section-divider{grid-column:1/-1;font-size:11px;font-weight:700;color:#1a3c2e;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid #e8f4e8;padding-bottom:6px;margin-top:8px}
    .modal-footer{padding:16px 24px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:12px}
    .btn-cancel{background:#f0f0f0;border:none;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:14px}
    .btn-save  {background:#1a3c2e;color:#fff;border:none;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:500}
    .btn-save:hover{background:#24523e}
    .btn-save:disabled{opacity:.6;cursor:not-allowed}

    /* ── Alert ── */
    .alert{padding:10px 16px;border-radius:7px;font-size:13px;margin-bottom:16px;display:none}
    .alert.success{background:#d4edda;color:#155724;display:block}
    .alert.error  {background:#f8d7da;color:#721c24;display:block}
  </style>
</head>
<body>

<div class="topbar">
  <h1>🧪 NanoCal Admin Panel</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="admin-name">Logged in as admin</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-total">—</div><div class="lbl">Total Products</div></div>
    <div class="stat-card"><div class="num" id="stat-instock">—</div><div class="lbl">In Stock</div></div>
    <div class="stat-card"><div class="num" id="stat-inquiries">—</div><div class="lbl">Total Inquiries</div></div>
    <div class="stat-card"><div class="num" id="stat-new">—</div><div class="lbl">New Inquiries</div></div>
  </div>

  <!-- Products section -->
  <div class="sec-header">
    <h2>Products</h2>
    <button class="btn-add" onclick="openModal()">+ Add Product</button>
  </div>
  <div id="alert-box" class="alert"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Image</th><th>Name</th><th>Category</th><th>Purity</th><th>Stock</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="products-table-body">
        <tr><td colspan="6" style="text-align:center;padding:30px;color:#888">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Inquiries section -->
  <div class="sec-header">
    <h2>Inquiries</h2>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Email</th><th>Subject</th><th>Product</th><th>Date</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="inquiries-table-body">
        <tr><td colspan="6" style="text-align:center;padding:30px;color:#888">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Add / Edit Product Modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Product</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full"><div class="section-divider">Basic Info</div></div>

        <div class="form-group full">
          <label>Product Name *</label>
          <input id="f-name" type="text" placeholder="e.g. CaCl₂ Industrial Desiccant Granules"/>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="f-category">
            <option value="">Select category</option>
            <option value="desiccant">Desiccant</option>
            <option value="industrial">Industrial</option>
            <option value="deicing">De-Icing</option>
            <option value="laboratory">Laboratory</option>
          </select>
        </div>
        <div class="form-group">
          <label>Image filename *</label>
          <input id="f-image" type="text" placeholder="e.g. product 1.png"/>
        </div>
        <div class="form-group full">
          <label>Short Description *</label>
          <textarea id="f-description" rows="2" placeholder="Brief description shown on products page"></textarea>
        </div>
        <div class="form-group full">
          <label>Full Description</label>
          <textarea id="f-fullDescription" rows="3" placeholder="Detailed description shown on product details page"></textarea>
        </div>
        <div class="form-group full">
          <label>Key Benefits (one per line)</label>
          <textarea id="f-benefits" rows="3" placeholder="Absorbs up to 150% of its own weight&#10;Effective in temperatures from -20°C to +50°C"></textarea>
        </div>

        <div class="form-group full"><div class="section-divider">Specs</div></div>

        <div class="form-group"><label>Purity</label><input id="f-purity" type="text" placeholder="99.5% min"/></div>
        <div class="form-group"><label>Particle Size</label><input id="f-particleSize" type="text" placeholder="2-6 mm granules"/></div>
        <div class="form-group"><label>Moisture Absorption</label><input id="f-moistureAbsorption" type="text" placeholder="150% of weight"/></div>
        <div class="form-group"><label>Form</label><input id="f-form" type="text" placeholder="Anhydrous Granules"/></div>
        <div class="form-group"><label>Packaging</label><input id="f-packaging" type="text" placeholder="25kg bags / 1000kg super sacks"/></div>
        <div class="form-group"><label>Chemical Formula</label><input id="f-chemicalFormula" type="text" placeholder="CaCl₂ (Anhydrous)"/></div>
        <div class="form-group"><label>Molecular Weight</label><input id="f-molecularWeight" type="text" placeholder="110.98 g/mol"/></div>
        <div class="form-group"><label>Bulk Density</label><input id="f-bulkDensity" type="text" placeholder="0.85-0.95 g/cm³"/></div>
        <div class="form-group"><label>Moisture Content</label><input id="f-moistureContent" type="text" placeholder="≤0.5%"/></div>
        <div class="form-group"><label>Appearance</label><input id="f-appearance" type="text" placeholder="White granules"/></div>
        <div class="form-group"><label>Shelf Life</label><input id="f-shelfLife" type="text" placeholder="24 months (sealed)"/></div>
        <div class="form-group">
          <label>In Stock</label>
          <select id="f-inStock">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script>
const API = 'https://nodejs-production-b8d01.up.railway.app/api';
let token = localStorage.getItem('admin_token');
let editingId = null;
let allProducts = [];

// ── Guard: redirect to home if no token ──────────────────────────────────────
if (!token) {
  alert('Please login first.');
  window.location.href = '../';
}

function logout() {
  localStorage.removeItem('admin_token');
  window.location.href = '../';
}

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
}

// ── Load products ────────────────────────────────────────────────────────────
async function loadProducts() {
  try {
    const res  = await fetch(`${API}/products`);
    const json = await res.json();
    allProducts = json.data || [];

    document.getElementById('stat-total').textContent   = allProducts.length;
    document.getElementById('stat-instock').textContent = allProducts.filter(p => p.inStock).length;

    const tbody = document.getElementById('products-table-body');
    if (!allProducts.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#888">No products yet.</td></tr>';
      return;
    }

    tbody.innerHTML = allProducts.map(p => `
      <tr>
        <td><img src="/${p.image}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;" onerror="this.style.display='none'"/></td>
        <td style="max-width:220px;font-weight:500">${p.name}</td>
        <td><span class="badge badge-${p.category}">${p.category}</span></td>
        <td>${p.specs?.purity || '—'}</td>
        <td class="${p.inStock ? 'stock-yes' : 'stock-no'}">${p.inStock ? 'Yes' : 'No'}</td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick="openModal('${p._id}')">Edit</button>
            <button class="btn-del"  onclick="deleteProduct('${p._id}', '${p.name.replace(/'/g,"\\'")}')">Delete</button>
          </div>
        </td>
      </tr>`).join('');
  } catch {
    document.getElementById('products-table-body').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:30px;color:#c0392b">Failed to load products.</td></tr>';
  }
}

// ── Load inquiries ───────────────────────────────────────────────────────────
async function loadInquiries() {
  try {
    const res  = await fetch(`${API}/inquiries`, { headers: authHeaders() });
    const json = await res.json();
    const list = json.data || [];

    document.getElementById('stat-inquiries').textContent = list.length;
    document.getElementById('stat-new').textContent = list.filter(i => i.status === 'new').length;

    const tbody = document.getElementById('inquiries-table-body');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#888">No inquiries yet.</td></tr>';
      return;
    }

    tbody.innerHTML = list.map(i => `
      <tr>
        <td>${i.firstName} ${i.lastName}</td>
        <td>${i.email}</td>
        <td>${i.subject}</td>
        <td>${i.productOfInterest || '—'}</td>
        <td>${new Date(i.createdAt).toLocaleDateString()}</td>
        <td><span class="status-${i.status}">${i.status}</span></td>
      </tr>`).join('');
  } catch {
    document.getElementById('inquiries-table-body').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:30px;color:#888">Could not load inquiries.</td></tr>';
  }
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Edit Product' : 'Add Product';
  clearForm();

  if (id) {
    const p = allProducts.find(x => x._id === id);
    if (!p) return;
    document.getElementById('f-name').value             = p.name || '';
    document.getElementById('f-category').value         = p.category || '';
    document.getElementById('f-image').value            = p.image || '';
    document.getElementById('f-description').value      = p.description || '';
    document.getElementById('f-fullDescription').value  = p.fullDescription || '';
    document.getElementById('f-benefits').value         = (p.benefits || []).join('\n');
    document.getElementById('f-purity').value           = p.specs?.purity || '';
    document.getElementById('f-particleSize').value     = p.specs?.particleSize || '';
    document.getElementById('f-moistureAbsorption').value = p.specs?.moistureAbsorption || '';
    document.getElementById('f-form').value             = p.specs?.form || '';
    document.getElementById('f-packaging').value        = p.specs?.packaging || '';
    document.getElementById('f-chemicalFormula').value  = p.specs?.chemicalFormula || '';
    document.getElementById('f-molecularWeight').value  = p.specs?.molecularWeight || '';
    document.getElementById('f-bulkDensity').value      = p.specs?.bulkDensity || '';
    document.getElementById('f-moistureContent').value  = p.specs?.moistureContent || '';
    document.getElementById('f-appearance').value       = p.specs?.appearance || '';
    document.getElementById('f-shelfLife').value        = p.specs?.shelfLife || '';
    document.getElementById('f-inStock').value          = p.inStock ? 'true' : 'false';
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function clearForm() {
  ['f-name','f-image','f-description','f-fullDescription','f-benefits',
   'f-purity','f-particleSize','f-moistureAbsorption','f-form','f-packaging',
   'f-chemicalFormula','f-molecularWeight','f-bulkDensity','f-moistureContent',
   'f-appearance','f-shelfLife'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-category').value = '';
  document.getElementById('f-inStock').value  = 'true';
}

// ── Save (add or edit) ───────────────────────────────────────────────────────
async function saveProduct() {
  const name     = document.getElementById('f-name').value.trim();
  const category = document.getElementById('f-category').value;
  const image    = document.getElementById('f-image').value.trim();
  const desc     = document.getElementById('f-description').value.trim();

  if (!name || !category || !image || !desc) {
    showAlert('Please fill in Name, Category, Image filename and Description.', 'error');
    return;
  }

  const body = {
    name, category, image,
    description:     desc,
    fullDescription: document.getElementById('f-fullDescription').value.trim(),
    benefits:        document.getElementById('f-benefits').value.split('\n').map(s=>s.trim()).filter(Boolean),
    inStock:         document.getElementById('f-inStock').value === 'true',
    specs: {
      purity:             document.getElementById('f-purity').value.trim(),
      particleSize:       document.getElementById('f-particleSize').value.trim(),
      moistureAbsorption: document.getElementById('f-moistureAbsorption').value.trim(),
      form:               document.getElementById('f-form').value.trim(),
      packaging:          document.getElementById('f-packaging').value.trim(),
      chemicalFormula:    document.getElementById('f-chemicalFormula').value.trim(),
      molecularWeight:    document.getElementById('f-molecularWeight').value.trim(),
      bulkDensity:        document.getElementById('f-bulkDensity').value.trim(),
      moistureContent:    document.getElementById('f-moistureContent').value.trim(),
      appearance:         document.getElementById('f-appearance').value.trim(),
      shelfLife:          document.getElementById('f-shelfLife').value.trim(),
    }
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const url    = editingId ? `${API}/products/${editingId}` : `${API}/products`;
    const method = editingId ? 'PUT' : 'POST';
    const res    = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
    const json   = await res.json();

    if (!json.success) throw new Error(json.message);

    closeModal();
    showAlert(editingId ? 'Product updated successfully!' : 'Product added successfully!', 'success');
    await loadProducts();
  } catch (err) {
    showAlert('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Product';
  }
}

// ── Delete ───────────────────────────────────────────────────────────────────
async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"?\n\nThis cannot be undone.`)) return;

  try {
    const res  = await fetch(`${API}/products/${id}`, { method: 'DELETE', headers: authHeaders() });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    showAlert('Product deleted.', 'success');
    await loadProducts();
  } catch (err) {
    showAlert('Delete failed: ' + err.message, 'error');
  }
}

// ── Alert helper ─────────────────────────────────────────────────────────────
function showAlert(msg, type) {
  const box = document.getElementById('alert-box');
  box.textContent = msg;
  box.className   = `alert ${type}`;
  setTimeout(() => box.className = 'alert', 4000);
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Init ─────────────────────────────────────────────────────────────────────
loadProducts();
loadInquiries();
</script>
</body>
</html>
